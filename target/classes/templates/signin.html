<!DOCTYPE html>
<html lang="pt-br" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Cadastro de Usuário</title>

    <style>
        *{
            margin:0;
            padding:0;
            box-sizing:border-box;
            font-family:Arial, sans-serif;
        }

        body{
            height:100vh;
            display:flex;
            justify-content:center;
            align-items:center;
            background:#f5f5f5;
        }

        .container{
            width:400px;
            background:white;
            padding:30px;
            border-radius:12px;
            box-shadow:0 0 10px rgba(0,0,0,0.1);
        }

        h1{
            text-align:center;
            margin-bottom:20px;
        }

        .form-group{
            margin-bottom:15px;
        }

        label{
            display:block;
            margin-bottom:5px;
            font-weight:bold;
        }

        input,
        select{
            width:100%;
            padding:10px;
            border:1px solid #ccc;
            border-radius:8px;
        }

        button{
            width:100%;
            padding:12px;
            border:none;
            border-radius:8px;
            background:#007bff;
            color:white;
            font-size:16px;
            cursor:pointer;
        }

        button:hover{
            background:#0056b3;
        }

        .message{
            margin-top:15px;
            text-align:center;
            font-weight:bold;
        }

        .success{
            color:green;
        }

        .error{
            color:red;
        }

        .login-link{
            text-align:center;
            margin-top:15px;
        }
    </style>
</head>
<body>

<div class="container">

    <h1>Cadastro de Usuário</h1>

    <form id="userForm">

        <div class="form-group">
            <label for="name">Nome</label>
            <input type="text" id="name" required>
        </div>

        <div class="form-group">
            <label for="email">Email</label>
            <input type="email" id="email" required>
        </div>

        <div class="form-group">
            <label for="password">Senha</label>
            <input type="password" id="password" required>
        </div>

        <div class="form-group">
            <label for="role">Tipo de Usuário</label>
            <select id="role">
                <option value="ROLE_ASTRONAUT">Astronauta</option>
                <option value="ROLE_CIVIL">Civil</option>
            </select>
        </div>

        <button type="submit">
            Cadastrar
        </button>

    </form>

    <div id="message" class="message"></div>

    <div class="login-link">
        <a th:href="@{/}">Voltar para Login</a>
    </div>

</div>

<script>
    document.getElementById("userForm")
        .addEventListener("submit", async function(event) {

            event.preventDefault();

            const user = {
                name: document.getElementById("name").value,
                email: document.getElementById("email").value,
                password: document.getElementById("password").value,
                role: document.getElementById("role").value
            };

            console.log("Payload enviado:", user);

            try {

                const response = await fetch("/users/save", {
                    method: "POST",
                    headers: {
                        "Content-Type": "application/json"
                    },
                    body: JSON.stringify(user)
                });

                if (response.ok) {

                    const data = await response.json();

                    console.log("Usuário criado:", data);

                    document.getElementById("message").className =
                        "message success";

                    document.getElementById("message").innerHTML =
                        "Usuário cadastrado com sucesso!";

                    document.getElementById("userForm").reset();

                } else {

                    const errorText = await response.text();

                    console.error("Erro do backend:", errorText);

                    document.getElementById("message").className =
                        "message error";

                    document.getElementById("message").innerHTML =
                        "Erro ao cadastrar usuário. Status: "
                        + response.status;
                }

            } catch (error) {

                console.error("Erro de requisição:", error);

                document.getElementById("message").className =
                    "message error";

                document.getElementById("message").innerHTML =
                    "Erro de conexão com o servidor.";
            }
        });
</script>

</body>
</html>
