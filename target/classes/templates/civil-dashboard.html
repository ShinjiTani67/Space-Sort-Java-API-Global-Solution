<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Lista de Amostras</title>

    <style>
        body {
            font-family: Arial, sans-serif;
            margin: 40px;
            background-color: #f4f4f4;
        }

        h1 {
            text-align: center;
        }

        table {
            width: 100%;
            border-collapse: collapse;
            background: white;
        }

        th {
            background-color: #1e293b;
            color: white;
            padding: 12px;
        }

        td {
            padding: 10px;
            border-bottom: 1px solid #ddd;
        }

        tr:hover {
            background-color: #f8fafc;
        }
    </style>
</head>
<body>

<h1>Lista de Amostras</h1>

<table>
    <thead>
    <tr>
        <th>UUID</th>
        <th>Nome</th>
        <th>Descrição</th>
        <th>Data</th>
        <th>Responsável</th>
    </tr>
    </thead>

    <tbody>
    <tr th:each="sample : ${samples}">
        <td th:text="${sample.uuid}"></td>
        <td th:text="${sample.name}"></td>
        <td th:text="${sample.description}"></td>
        <td th:text="${sample.data}"></td>
        <td th:text="${sample.owner}"></td>
    </tr>
    </tbody>

</table>

</body>
</html>
